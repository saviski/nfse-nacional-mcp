name: Check NFS-e API changes

# Roda toda segunda-feira às 10:00 BRT (13:00 UTC) e também sob demanda
# via "Run workflow" na aba Actions do GitHub.
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents:      write   # commit do baseline atualizado + branches do Claude
  issues:        write   # abertura/atualização do issue de notificação
  pull-requests: write   # Claude abre PR quando detecta mudança material

concurrency:
  group: check-nfse-changes
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run snapshot check
        id: check
        run: python3 .github/scripts/check_nfse_changes.py

      - name: Open or update issue
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `🔔 NFS-e API: mudança detectada em ${today}`;
            const report = process.env.REPORT || '(sem detalhes)';

            const body = [
              '## Mudança detectada na documentação/API oficial do NFS-e Nacional',
              '',
              'Este issue foi aberto automaticamente por',
              '`.github/workflows/check-nfse-changes.yml`.',
              '',
              report,
              '',
              '---',
              '',
              '@claude — analisa por favor o diff do commit mais recente em',
              '`.github/nfse-snapshot/baseline/` (feito pelo `github-actions[bot]`',
              'logo antes deste issue) e responda:',
              '',
              '1. **O que mudou de fato?** Ignore ruído (timestamps, CSRF tokens,',
              '   IDs de sessão, reordenação de campos sem significado). Foque em:',
              '   - novos/removidos endpoints no Swagger',
              '   - mudanças no schema DPS v1.01 (campos, tipos, obrigatoriedade)',
              '   - novas regras tributárias, CSTs ou alíquotas',
              '   - mudanças em autenticação mTLS / headers obrigatórios',
              '2. **Isso afeta este projeto?** Cruze com o código em',
              '   `emitir_nfse.py` — especialmente `build_dps_xml`, `emitir_via_api`,',
              '   `baixar_pdf`, `descobrir_proximo_ndps`, `consultar_ultimo_nnfse_via_api`.',
              '3. **Se afeta:** abra um PR com as correções. Se não afeta ou é só',
              '   cosmético, comente explicando e feche este issue.',
              '',
              'Se o diff for enorme e não couber na sua análise, priorize o Swagger',
              '(`swagger-contribuinte-issqn.raw`) — as outras URLs são só sinalizadoras.',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels:'nfse-api-change',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### Novo run — ${today}\n\n${report}`,
              });
              core.info(`Comentário adicionado ao issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['nfse-api-change', 'automated'],
              });
              core.info(`Issue #${created.data.number} criado`);
            }

      - name: Commit baseline updates
        id: baseline-commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/nfse-snapshot/
          if git diff --staged --quiet; then
            echo "Baseline inalterado — nada a commitar"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update NFS-e API baseline snapshot"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Análise autônoma pelo Claude ────────────────────────────────────────
      # Roda SOMENTE quando há mudança material e o commit de baseline foi
      # publicado (pra Claude poder inspecionar o diff via `git show HEAD`).
      # Modelo: Sonnet 4.6 (5× mais barato que Opus, suficiente pra diff de API).
      - name: Claude — analisa diff e propõe PR
        if: steps.check.outputs.has_changes == 'true' && steps.baseline-commit.outputs.committed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Um snapshot de URLs oficiais do Sistema Nacional NFS-e mudou.
            Relatório do watcher semanal:

            ${{ steps.check.outputs.report }}

            O diff completo do baseline está no último commit do branch `main`
            com a mensagem `chore: update NFS-e API baseline snapshot`. Inspecione
            com `git show HEAD -- .github/nfse-snapshot/baseline/`. O arquivo
            principal é `swagger-contribuinte-issqn.raw` (Swagger JSON) — as
            outras URLs são apenas sinalizadoras.

            ## Sua missão

            **1. Classifique a mudança** em uma destas categorias:

               a) **RUÍDO** — timestamps, IDs de build, CSRF tokens, reordenação
                  sem efeito semântico, diferenças de whitespace/encoding.
                  → **Ação**: comente no issue aberto (label `nfse-api-change`)
                  explicando que é ruído e **feche o issue**. Não mexa no código.

               b) **MATERIAL mas ambíguo** — mudança clara na documentação/API
                  mas impacto no código é incerto ou depende de decisão humana
                  (ex: novo campo opcional, endpoint adicionado que não usamos,
                  mudança de regime tributário hipotética).
                  → **Ação**: atualize o issue com análise detalhada pedindo
                  revisão humana. **Não abra PR.**

               c) **MATERIAL e claro** — mudança concreta que quebra ou exige
                  atualização imediata do código (ex: endpoint renomeado,
                  campo obrigatório novo, formato de resposta mudou).
                  → **Ação**: crie um branch `claude/nfse-api-update-<data>`,
                  atualize o código, abra PR referenciando o issue, e comente
                  no issue com link do PR.

            **2. Onde olhar no código** (foco em `emitir_nfse.py`):

               - `build_dps_xml` — geração do XML DPS v1.01
               - `assinar_dps` — XMLDSig
               - `emitir_via_api` — POST /SefinNacional/nfse
               - `baixar_pdf` — GET /danfse/{chave}
               - `descobrir_proximo_ndps` + `consultar_ultimo_nnfse_via_api`
                 — descoberta do próximo nDPS via /DFe/0
               - `session_mtls` — autenticação mTLS

            **3. Contexto fiscal fixo** (não sugira mudar, é do regime do usuário):

               - Regime: Lucro Presumido
               - Operação: Exportação de serviços (tribISSQN=3)
               - PIS/COFINS CST=08 (alíquota zero)
               - pTotTribFed = 7.68% (IRPJ + CSLL)

            **4. Ferramentas**: use o `gh` CLI (já autenticado) para `gh issue
            comment`, `gh issue close`, `gh pr create`. Use `git` normalmente
            para branches e commits. Rode `python3 -m py_compile emitir_nfse.py`
            antes de commitar qualquer alteração de código.

            Seja conservador: em caso de dúvida, prefira categoria (b) e peça
            revisão humana a fazer uma alteração insegura em código fiscal.
          claude_args: |
            --max-turns 12
            --model claude-sonnet-4-6
            --allowedTools Bash,Read,Write,Edit,Grep,Glob
